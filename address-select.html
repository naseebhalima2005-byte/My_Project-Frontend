
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Shipping Address</title>

<style>
html,body{
  width:100%;
  height:100%;
  overflow-x: hidden;
} 
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}


.top-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
border-bottom:1px solid #ddd;
background:#f6f6f6;
}


.progress-container{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:60%;
position:relative;
right:18%;
color:#6b1d1d;
}

.step{text-align:center;}

.circle{
width:30px;
height:30px;
border-radius:50%;
border:2px solid #ccc;
display:flex;
align-items:center;
justify-content:center;
background:#6b1d1d;
color:white;
}

.line{
height:2px;
width:80px;
background:#6b1d1d;
}



.container{
display:flex;
justify-content:space-between;
padding:40px 40px;
 gap:20px;  
   overflow:hidden;         

}


.left{
  width:60%;
  display:flex;
  flex-direction:column;
  gap:15px;
   min-width:300px;
  
    padding: 15px;
     border-radius:10px;
}
.right{
width:35%;
background:white;
padding:15px;
border-radius:8px;
 min-width:280px;
  overflow:hidden;
   border-radius:10px;
}



 .address-box{
  background:white;
  padding:20px;
  border-radius:8px;
  border:1px solid #ddd;
  width:100%;         
  max-width:50%;    
  position:relative;
   padding-right:40px;
    overflow:visible;
    margin-right:5px;  
}

.close-btn{
position:absolute;
top:8px;
right:10px;
font-size:22px;
cursor:pointer;
color:#7a1f3d;
}
.close-btn:hover{
  transform: scale(1.2);
}
.radio{margin-right:10px;}


.add-address{
margin-top:20px;
color:#7a1f3d;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.plus-icon{
width:25px;
height:25px;
border-radius:50%;
background:#7a1f3d;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

.cart-item div{
  word-wrap:break-word;
}

.cart-item{
display:flex;
gap:10px;
align-items:center;

}

.cart-item img{
width:60px;
 max-width:100%;
  height:auto;
}

.continue-btn{
width:100%;
padding:12px;
background:#6b1d1d;
color:white;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

.summary{
margin-top:20px;
font-size:14px;
}

.summary div{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.footer{
  background:#eee5e0;
  padding:25px 20px;
  border-top:1px solid #ddd;

  position: relative;
  margin-top:40px;
}


.logo-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  flex-wrap:wrap;
}

.logo-container img{
  height:40px;
  object-fit:contain;
}


.need{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
  color:#424145;
}


.whatsapp{
  position:absolute;
  right:20px;
  bottom:20px;
}

.whatsapp img{
  width:45px;
  cursor:pointer;
}
.sele{
    color:#3d3846;
}
.car{
    color:#3d3846;
}
@media screen and (max-width: 768px) {

.top-header{
flex-direction:column;
gap:15px;
padding:15px;
}



.progress-container{
width:100%;
position:static;
justify-content:center;
}


  .container {
    flex-direction: column;   
    padding: 10px;
     gap:15px;            
  }

  .left, .right {
    width: 100%;             
  min-width:0;
  padding: 0;
  }

  .progress-container {
    width: 100%;
    right: 0;
    gap: 5px;
  }

  .address-box {
    width: 100%;   
     max-width:50%;            
  }


  .circle {
    width: 25px;
    height: 25px;
    font-size: 14px;
  }

  .line {
    width: 50px;
  }
  

  .footer{
    padding:20px 15px;
    text-align:center;
  }

  .logo-container{
    gap:15px;
  }

  .logo-container img{
    height:30px;
  }

  .need{
    font-size:14px;
    margin-top:10px;
  }

  .whatsapp{
    position: static;   
    margin-top:10px;
  }

  .whatsapp img{
    width:40px;
  }

}

@media screen and (max-width:1024px){

.top-header{
  flex-direction:row;       
  flex-wrap:wrap;
  gap:15px;
  padding:15px 20px;
}

.progress-container{
  width:100%;
  position:static;
  justify-content:center;
  gap:10px;
}


.container{
  display:flex;
  flex-direction:row;        
  padding:10px;
  gap:20px;
}


.left{
  width:60%;
}

.right{
  width:40%;
}


.address-box{
  width:100%;
}

.circle{
  width:28px;
  height:28px;
  font-size:14px;
}

.line{
  width:60px;
}


.footer{
  padding:25px 20px;
  text-align:center;
}

.logo-container{
  gap:15px;
  justify-content:center;
}

.logo-container img{
  height:32px;
}

.need{
  font-size:15px;
}

.whatsapp{
  position:fixed;   
  right:20px;
  bottom:20px;
}

}
</style>
</head>

<body>

<div class="top-header">
<img src="fabindia.svg">

<div class="progress-container">

<div class="step">
<div class="circle">1</div>
<p>Cart</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">2</div>
<p>Address</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">3</div>
<p>Payment</p>
</div>

</div>
</div>


<div class="container">


<div class="left">

<h2 class="sele">SELECT ADDRESS</h2>

<div id="addressContainer"></div>

<div class="add-address" onclick="goToCheckout()">
<span class="plus-icon">+</span>
<span>Add New Address</span>
</div>

</div>




<div class="right">

<h3 class="car">CART DETAILS</h3>

<div class="cart-item">
<img src="s1.avif">
<div>
Blue Cotton Short Kurta<br>
Qty 1
</div>
</div>

<button class="continue-btn" onclick="goToPayment()">Continue</button>

<div class="summary">

<h4>ORDER SUMMARY (1 item)</h4>
<div><span>Total MRP</span><span>₹1,899</span></div>
<div><span>Discount</span><span>-₹570</span></div>
<div><span>Delivery</span><span>FREE</span></div>

<hr>

<div><strong>Amount Payable</strong><strong>₹1,329</strong></div>

</div>

</div>

</div>


<div class="footer">

  <div class="logo-container">
    <img src="https://cdn-icons-png.flaticon.com/512/196/196578.png" alt="Visa">
    <img src="https://cdn-icons-png.flaticon.com/512/196/196561.png" alt="Mastercard">
    <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="RuPay">
    <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png" alt="UPI">
    <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png" alt="GPay">
  </div>

  <p class="need">Need Help? Contact Us</p>

  <div class="whatsapp">
    <a href="#">
      <img src="https://img.icons8.com/color/48/whatsapp.png">
    </a>
  </div>

</div>

<script>



window.onload=function(){

let address=localStorage.getItem("userAddress");

if(address){

document.getElementById("addressContainer").innerHTML=`

<div class="address-box">

<span class="close-btn">&times;</span>

<h3>
<input type="radio" checked class="radio">
(Default)
</h3>

<p>${address}</p>

</div>

`;

}

}




document.addEventListener("click",function(e){

if(e.target.classList.contains("close-btn")){

e.target.parentElement.remove();

localStorage.removeItem("userAddress");

alert("Address deleted successfully");

}

});



function goToCheckout(){

window.location.href="checkout.html";

}

function goToPayment(){

window.location.href="payment.html";

}

</script>


</body>
</html>
