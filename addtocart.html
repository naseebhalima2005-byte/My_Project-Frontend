<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart</title>
    <link rel="stylesheet"type="text/css"href="style.css">
     <style>
 html,body{
  width:100%;
  height:100%;
  overflow-x: hidden;
} 
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}


.top-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 50px;
border-bottom:1px solid #ddd;
background:#f6f6f6;
}



.progress-container{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:60%;
position:relative;
right:18%;
color:#6b1d1d;
}

.step{text-align:center;}

.circle{
width:30px;
height:30px;
border-radius:50%;
border:2px solid #ccc;
display:flex;
align-items:center;
justify-content:center;
background:#6b1d1d;
color:white;
}

.line{
height:2px;
width:80px;
background:#6b1d1d;
}

.footer{
  background:#eee5e0;
  padding:25px 20px;
  border-top:1px solid #ddd;

  position: relative;
  margin-top:200px;
}


.logo-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  flex-wrap:wrap;
}

.logo-container img{
  height:40px;
  object-fit:contain;
}


.need{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
  color:#424145;
}


.whatsapp{
  position:absolute;
  right:40px;
  bottom:20px;
}

.whatsapp img{
  width:45px;
  cursor:pointer;
}
.cart-container{
    display:flex;
    width:90%;
    margin:40px auto;
    gap:30px;
     flex-wrap:wrap; 
}

#cart-left{
    flex:2;
    background:white;
    padding:20px;
}

@media (max-width:768px){



.top-header{
flex-direction:column;
gap:15px;
padding:15px;
}



.progress-container{
width:100%;
position:static;
justify-content:center;
}

  body{
    margin:0;
    padding:0;
  }


  .cart-container{
    flex-direction:column !important;
    padding:10px;
    width:100%;
  }

  .cart-item{
    display:flex;
    gap:10px;
    align-items:flex-start;
    width:100%;
  }

  .cart-img{
    width:100px;          
    flex-shrink:0;
  }

  .cart-item div{
    flex:1;
    min-width:0;
  }

  .cart-item h3{
    font-size:15px;
    line-height:1.4;

    white-space:normal;
    word-break:normal;        
    overflow-wrap:break-word; 
  }



}
  .footer{
    padding:20px 15px;
    text-align:center;
  }

  .logo-container{
    gap:15px;
  }

  .logo-container img{
    height:30px;
  }

  .need{
    font-size:14px;
    margin-top:10px;
  }

  .whatsapp{
    position: static;   
    margin-top:10px;
  }

  .whatsapp img{
    width:40px;
  }


@media (max-width:1024px){

.top-header{
  flex-direction:row;  
  flex-wrap:wrap;
  gap:15px;
  padding:15px 20px;
}

.progress-container{
  width:100%;
  position:static;
  justify-content:center;
}


.cart-container{
  display:flex;
  flex-direction:row;   
  gap:20px;
  width:100%;
}


#cart-left{
  width:60%;
}

#cart-right{
  width:40%;
}


.footer{
  padding:25px 20px;
  text-align:center;
}

.logo-container{
  gap:15px;
  justify-content:center;
}

.logo-container img{
  height:32px;
}

.need{
  font-size:15px;
}

.whatsapp{
  position:fixed;   
  right:20px;
  bottom:20px;
}

}
     </style>
</head>
<body>

    <div class="top-header">
    <img src="fabindia.svg">
 <div class="progress-container">
        <div class="step">
            <div class="circle done">1</div>
            <p>Cart</p>
        </div>

        <div class="line active-line"></div>

        <div class="step">
            <div class="circle active">2</div>
            <p>Address</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <div class="circle">3</div>
            <p>Payment</p>
        </div>
    </div>
</div>
<div class="cart-container">
    <div id="cart-left"></div>
    <div id="cart-right"></div>
</div>

<script src="script.js"></script>
 
<div class="footer">

  <div class="logo-container">
    <img src="https://cdn-icons-png.flaticon.com/512/196/196578.png" alt="Visa">
    <img src="https://cdn-icons-png.flaticon.com/512/196/196561.png" alt="Mastercard">
    <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="RuPay">
    <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png" alt="UPI">
    <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png" alt="GPay">
  </div>

  <p class="need">Need Help? Contact Us</p>

  <div class="whatsapp">
    <a href="#">
      <img src="https://img.icons8.com/color/48/whatsapp.png">
    </a>
  </div>

</div>
</body>
</html>
