<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title> Checkout Payment Details</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f5f5f5;
}
html,body{
  width:100%;
  height:100%;
  overflow-x: hidden;
}  

.top-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    border-bottom:1px solid #ddd;
    background:#f6f6f6;
}

.progress-container{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:60%;
    position: relative;
    right:18%;
    color:#6b1d1d;
}

.step{
    text-align:center;
}

.circle{
    width:30px;
    height:30px;
    border-radius:50%;
    border:2px solid #ccc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:white;
    background:#6b1d1d;
}

.circle.done{
    background:#6b1d1d;
    border-color:#6b1d1d;
    color:white;
}

.circle.active{
    border-color:#6b1d1d;
    color:white;
    font-weight:bold;
    background:#6b1d1d;
}

.line{
    height:2px;
    width:80px;
     background:#6b1d1d;
}

.active-line{
    background:#6b1d1d;
}


 .container{
  display:flex;
  width:100%;
  max-width:1200px;
  margin:20px auto;
  padding:0 10px;
  gap:20px;
  box-sizing:border-box;
}

.left{
  width:60%;
  background:white;
  padding:20px;
  box-shadow:0 0 10px #ddd;
  box-sizing:border-box;
}

.right{
  width:40%;
  background:white;
  padding:20px;
  box-shadow:0 0 10px #ddd;
   box-sizing:border-box;
}

.payment-option{
  padding:12px;
  border:1px solid #ddd;
  margin-bottom:10px;
  cursor:pointer;
}

.payment-option:hover{
  background:#f0f0f0;
}

.pay-section{
  display:none;
  margin-top:15px;
}


.pay-section input, select{
  width:100%;
   box-sizing:border-box;
}

.pay-btn{
  margin-top:10px;
  padding:10px 20px;
  background:#8b0000;
  color:white;
  border:none;
  cursor:pointer;
  border-radius: 20px;
}

.summary{
  display:flex;
  gap:15px;
}

.summary img{
  width:80px;
}

.price{
  margin-top:15px;
  border-top:1px solid #ddd;
  padding-top:10px;
}

.price p{
  display:flex;
  justify-content:space-between;
}

.esti{
    color:#8b0000;
    font-style: italic;
}

.footer{
  background:#eee5e0;
  padding:25px 20px;
  border-top:1px solid #ddd;

  position: relative;
  margin-top:10px;
}


.logo-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  flex-wrap:wrap;
}

.logo-container img{
  height:40px;
  object-fit:contain;
}


.need{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
  color:#424145;
}


.whatsapp{
  position:absolute;
  right:20px;
  bottom:20px;
}

.whatsapp img{
  width:45px;
  cursor:pointer;
}

@media screen and (max-width: 768px){

.top-header{
  flex-direction:column;
  gap:10px;
  padding:10px;
}




.progress-container{
  width:100%;
  position:static;
  display:flex;
  justify-content:center;
  gap:5px;
}

.circle{
  width:24px;
  height:24px;
  font-size:12px;
}

.line{
  width:40px;
}


 
  .payment-option{
    padding:10px;
    font-size:14px;
  }

  .pay-section input{
    padding:8px;
    margin-bottom:8px;
  } 
  .container{
    display:flex !important;
    flex-direction:column !important;   
  }

  .left, .right{
    width:100% !important;              
    display:block;
    padding:15px;
  }


  .right{
    order:-1 !important;
  }


  .left{
    order:1 !important;
  }

  .summary{
    display:flex;
    flex-direction:column !important;   
    align-items:center;
    text-align:center;
  }

  .summary img{
    width:110px;
    height:auto;
  }




.footer{
  padding:15px;
  text-align:center;
}

.logo-container img{
  height:28px;
}

.whatsapp{
  position:static;
  margin-top:10px;
}

body{
  overflow-x:hidden;
}
}
@media screen and (max-width:1024px){

.container{
  display:flex;
  flex-direction:row;    
  gap:20px;
  width:95%;
  margin:20px auto;
}


.left{
  width:55%;
}

.right{
  width:45%;
}


.summary{
  display:flex;
  gap:12px;
}

.summary img{
  width:100px;
  height:auto;
  object-fit:contain;
  flex-shrink:0;
}

}
</style>
</head>

<body>

<div class="top-header">
    <img src="fabindia.svg">
 <div class="progress-container">
        <div class="step">
            <div class="circle done">1</div>
            <p>Cart</p>
        </div>

        <div class="line active-line"></div>

        <div class="step">
            <div class="circle active">2</div>
            <p>Address</p>
        </div>

        <div class="line"></div>

        <div class="step">
            <div class="circle">3</div>
            <p>Payment</p>
        </div>
    </div>
</div>

<div class="container">

<div class="left">
<h3>Payment Details</h3>

<div class="payment-option" onclick="showSection('upi')">UPI</div>
<div class="payment-option" onclick="showSection('card')">Cards</div>
<div class="payment-option" onclick="showSection('net')">Net Banking</div>
<div class="payment-option" onclick="showSection('wallet')">Wallet</div>
<div class="payment-option" onclick="showSection('cod')">Cash On Delivery</div>


<div id="upi" class="pay-section">
  <input type="text" id="upiName" placeholder="Full Name">
  <input type="text" id="upiId" placeholder="UPI ID">
  <input type="text" id="upiBank" placeholder="Bank Name">
  <button class="pay-btn" onclick="validateUPI()">Pay Now</button>
</div>


<div id="card" class="pay-section">
  <input type="text" id="cardName" placeholder="Card Holder Name">
  <input type="text" id="cardNumber" placeholder="Card Number">
  <input type="text" id="cardExpiry" placeholder="Expiry Date">
  <input type="text" id="cardCvv" placeholder="CVV">
  <button class="pay-btn" onclick="validateCard()">Pay Now</button>
</div>


<div id="net" class="pay-section">
  <input type="text" id="netName" placeholder="Account Holder Name">
  <select id="netBank">
    <option value="">Select Bank</option>
    <option>SBI</option>
    <option>HDFC</option>
    <option>ICICI</option>
  </select>
  <button class="pay-btn" onclick="validateNet()">Pay Now</button>
</div>


<div id="wallet" class="pay-section">
  <input type="text" id="walletName" placeholder="Wallet Number">
  <button class="pay-btn" onclick="validateWallet()">Pay Now</button>
</div>


<div id="cod" class="pay-section">
  <input type="text" id="codName" placeholder="Receiver Name">
  <button type="button" class="pay-btn" onclick="validateCOD()">Confirm Order</button>
</div>

</div>


<div class="right">
<h3>Order Summary</h3>

<div class="summary">
<img src="s1.avif">
<div>
<p>White Printed Kurta</p>
<p>Qty: 1</p>
<p class="esti">Estimated Delivery by 10 April</p>
</div>
</div>

<div class="price">
<p><span>Total MRP</span><span>₹1899</span></p>
<p><span>Discount</span><span>-₹500</span></p>
<p><span>Delivery</span><span>FREE</span></p>
<hr>
<p><b>Amount Payable</b><b>₹1399</b></p>
</div>

</div>
</div>
<div class="footer">

  <div class="logo-container">
    <img src="https://cdn-icons-png.flaticon.com/512/196/196578.png" alt="Visa">
    <img src="https://cdn-icons-png.flaticon.com/512/196/196561.png" alt="Mastercard">
    <img src="https://cdn-icons-png.flaticon.com/512/349/349228.png" alt="RuPay">
    <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png" alt="UPI">
    <img src="https://cdn-icons-png.flaticon.com/512/6124/6124998.png" alt="GPay">
  </div>

  <p class="need">Need Help? Contact Us</p>

  <div class="whatsapp">
    <a href="#">
      <img src="https://img.icons8.com/color/48/whatsapp.png">
    </a>
  </div>

</div>


<script>
function showSection(id){
  var sections=document.querySelectorAll(".pay-section");
  sections.forEach(sec=>sec.style.display="none");
  document.getElementById(id).style.display="block";
}

function validateUPI(){
  if(upiName.value==""||upiId.value==""||upiBank.value==""){
    alert("Please fill all UPI details");
  }else{
    alert("Order Confirmed Successfully!");
  }
}

function validateCard(){
  if(cardName.value==""||cardNumber.value==""||cardExpiry.value==""||cardCvv.value==""){
    alert("Please fill all Card details");
  }else{
    alert("Order Confirmed Successfully!");
  }
}

function validateNet(){
  if(netName.value==""||netBank.value==""){
    alert("Please select bank and enter name");
  }else{
    alert("Order Confirmed Successfully!");
  }
}

function validateWallet(){
  if(walletName.value==""){
    alert("Please enter wallet number");
  }else{
    alert("Order Confirmed Successfully!");
  }
}

function validateCOD(){
  if(codName.value==""){
    alert("Please enter receiver name");
  }else{
    alert("Ordered Confirmed Successfully!✅");
     window.location.href="index.html";
  }
}

</script>

</body>
</html>
